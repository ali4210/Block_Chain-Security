name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  security-pipeline:
    name: Run Blockchain DevSecOps Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm install

      - name: Setup Python 3.11 for Slither
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv python3-virtualenv jq curl build-essential software-properties-common

      - name: Install Solidity compiler
        run: |
          sudo add-apt-repository ppa:ethereum/ethereum -y
          sudo apt-get update
          sudo apt-get install -y solc

      - name: Install Slither only
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "slither-analyzer==0.11.5"

      - name: Create Mythril isolated environment
        continue-on-error: true
        run: |
          virtualenv -p python3 mythril-only-env
          ./mythril-only-env/bin/pip install --upgrade pip setuptools wheel
          ./mythril-only-env/bin/pip install "mythril==0.24.8"

      - name: Verify Python security tools
        if: always()
        run: |
          slither --version
          if [ -x "./mythril-only-env/bin/myth" ]; then
            ./mythril-only-env/bin/myth version
          else
            echo "Mythril not available, continuing without it"
          fi

      - name: Make scripts executable
        run: |
          chmod +x ./scripts/run-slither.sh || true
          chmod +x ./scripts/pipeline-security.sh || true
          chmod +x ./scripts/pipeline-security-strict.sh || true
          chmod +x ./scripts/pipeline-security-failfast.sh || true

      - name: Run normal security pipeline
        run: npm run pipeline:security

      - name: Run enrichment stage
        if: always()
        run: npm run enrich:findings

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-html-reports
          path: reports/html/
          if-no-files-found: warn

      - name: Upload incident reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-incident-reports
          path: reports/incident/
          if-no-files-found: warn

      - name: Upload normalized and enriched dashboard data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard-data
          path: dashboard/data/
          if-no-files-found: warn

      - name: Upload all raw reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-raw-reports
          path: reports/
          if-no-files-found: warn